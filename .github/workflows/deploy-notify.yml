name: Deployment Email Notification

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send deployment notification
        env:
          DEPLOY_HOOK_TOKEN: ${{ secrets.DEPLOY_HOOK_TOKEN }}
          COMMIT_MSG:    ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          NOW_MS=$(date +%s%3N)
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"

          PAYLOAD=$(jq -n \
            --arg  type       "deployment.succeeded" \
            --arg  id         "${{ github.run_id }}" \
            --arg  name       "kyanjajuniorschool.com" \
            --arg  url        "kyanjajuniorschool.com" \
            --arg  target     "production" \
            --arg  branch     "${{ github.ref_name }}" \
            --arg  commitMsg  "$COMMIT_MSG" \
            --arg  commitAuth "$COMMIT_AUTHOR" \
            --arg  commitSha  "$SHORT_SHA" \
            --arg  dashUrl    "$COMMIT_URL" \
            --argjson now     "$NOW_MS" \
            '{
              type: $type,
              id:   $id,
              payload: {
                deployment: {
                  name:   $name,
                  url:    $url,
                  target: $target,
                  meta: {
                    githubBranch:           $branch,
                    githubCommitMessage:    $commitMsg,
                    githubCommitAuthorName: $commitAuth,
                    githubCommitSha:        $commitSha
                  },
                  readyAt: $now
                },
                links: { deployment: $dashUrl }
              }
            }')

          HTTP_STATUS=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DEPLOY_HOOK_TOKEN" \
            -d "$PAYLOAD" \
            https://kyanjajuniorschool.com/api/deploy-hook)

          cat /tmp/resp.txt && echo ""

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Notification sent (HTTP $HTTP_STATUS)"
          else
            echo "❌ Notification failed (HTTP $HTTP_STATUS)" && exit 1
          fi
